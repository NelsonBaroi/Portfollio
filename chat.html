<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Nelson Baroi — AI Twin</title>
<meta name="description" content="Talk to Nelson Baroi's AI twin — trained on his real conversations, biography, and personality.">
<link rel="canonical" href="https://nbaroi.com/chat.html">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a14;
  --bg-secondary: #14142a;
  --bg-tertiary: #1a1a2e;
  --bg-hover: #252545;
  --border: #2a2a4a;
  --text-primary: #e8e8f0;
  --text-secondary: #a8a8b8;
  --text-muted: #555570;
  --accent: #00bebe;
  --accent-2: #ff7f50;
  --accent-3: #4567B7;
  --user-msg: linear-gradient(135deg, #4567B7, #1a3a8a);
  --bot-msg: #1a1a2e;
  --shadow: 0 4px 12px rgba(0,0,0,0.3);
  --radius: 14px;
}

body {
  font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ============== HEADER ============== */
.chat-header {
  background: linear-gradient(135deg, #4567b761, #2e3a5961);
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  backdrop-filter: blur(10px);
  z-index: 10;
}
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  object-fit: cover;
  flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-info h1 {
  font-size: 1.05rem;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.live-dot {
  width: 8px;
  height: 8px;
  background: #2aad6a;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-info p {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  text-decoration: none;
  font-size: 0.9rem;
}
.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-hover);
}

/* ============== MESSAGES ============== */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.message {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.6;
  font-size: 0.93rem;
  word-wrap: break-word;
  animation: slideIn 0.3s ease;
  box-shadow: var(--shadow);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user {
  align-self: flex-end;
  background: var(--user-msg);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.bot {
  align-self: flex-start;
  background: var(--bot-msg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message .sender {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.8;
}
.message.user .sender { color: #cfdcff; }
.message.bot .sender { color: var(--accent); }

.message .content { line-height: 1.6; }
.message .content > *:not(:last-child) { margin-bottom: 8px; }
.message .content p { margin: 0; }
.message .content ul, .message .content ol {
  margin-left: 20px;
}
.message .content li { margin: 3px 0; }
.message .content strong { color: #fff; font-weight: 600; }
.message .content em { color: var(--accent-2); font-style: italic; }
.message .content code {
  background: rgba(0,0,0,0.4);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 0.85em;
  color: var(--accent);
}
.message .content pre {
  background: #0a0a14;
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid var(--border);
}
.message .content pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: 0.85em;
}
.message .content a { color: var(--accent); text-decoration: underline; }
.message .content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}

/* Typing dots */
.typing-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}
.typing-dots span {
  width: 8px;
  height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* Streaming cursor */
.cursor-blink {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  vertical-align: text-bottom;
  animation: blink 1s infinite;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ============== SUGGESTIONS ============== */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 20px 12px;
}
.suggestion-chip {
  padding: 7px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.suggestion-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-hover);
  transform: translateY(-1px);
}

/* ============== INPUT AREA ============== */
.chat-input-area {
  padding: 12px 20px 16px;
  background: var(--bg-tertiary);
  border-top: 1px solid var(--border);
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 6px 6px 12px;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: var(--accent); }
.input-row textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  resize: none;
  padding: 8px 0;
  max-height: 140px;
  min-height: 24px;
  line-height: 1.4;
}
.input-row textarea::placeholder { color: var(--text-muted); }
.send-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--accent);
  color: #0a0a14;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  transition: all 0.15s;
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) {
  background: var(--accent-2);
  transform: translateY(-1px);
}
.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.mic-btn { background: transparent; color: var(--text-secondary); }
.mic-btn:hover:not(:disabled) { color: var(--accent); transform: none; background: var(--bg-hover); }
.mic-btn.recording { color: #ff5555; animation: pulse 1.5s infinite; }

.status-bar {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-muted);
  padding: 6px;
  background: var(--bg-primary);
}
.status-bar a { color: var(--text-muted); text-decoration: none; }
.status-bar a:hover { color: var(--accent); }

/* ============== MOBILE ============== */
@media (max-width: 600px) {
  .chat-header { padding: 10px 14px; }
  .header-info h1 { font-size: 0.95rem; }
  .header-info p { font-size: 0.7rem; }
  .icon-btn { width: 32px; height: 32px; font-size: 0.8rem; }
  .chat-messages { padding: 14px; }
  .message { max-width: 90%; padding: 10px 14px; font-size: 0.9rem; }
  .suggestions { padding: 0 14px 10px; }
  .chat-input-area { padding: 10px 14px 14px; }
}
</style>
</head>
<body>

<header class="chat-header">
  <img src="images/profile.jpg" alt="Nelson Baroi" class="avatar">
  <div class="header-info">
    <h1><span class="live-dot"></span> Nelson Baroi <span style="color:var(--text-muted);font-weight:400;font-size:0.85em">— AI Twin</span></h1>
    <p>Director, Rooppur Nuclear Power Plant · MSc ATU Galway · Trilingual</p>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="voiceToggleBtn" title="Voice output (off)" aria-label="Toggle voice output">
      <i class="fas fa-volume-mute"></i>
    </button>
    <button class="icon-btn" id="exportBtn" title="Export conversation" aria-label="Export">
      <i class="fas fa-download"></i>
    </button>
    <button class="icon-btn" id="resetBtn" title="Reset conversation" aria-label="Reset">
      <i class="fas fa-redo"></i>
    </button>
    <a href="index.html" class="icon-btn" title="Back to portfolio" aria-label="Home">
      <i class="fas fa-home"></i>
    </a>
  </div>
</header>

<div class="chat-messages" id="chatMessages" role="log" aria-live="polite">
  <!-- messages injected here -->
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion-chip" data-msg="What do you do?">What do you do?</button>
  <button class="suggestion-chip" data-msg="Tell me about Rooppur Nuclear Power Plant">Rooppur project</button>
  <button class="suggestion-chip" data-msg="Why are you going to Ireland?">Why Ireland?</button>
  <button class="suggestion-chip" data-msg="What technical skills do you have?">Tech skills</button>
  <button class="suggestion-chip" data-msg="What languages do you speak?">Languages</button>
  <button class="suggestion-chip" data-msg="How can I contact you?">Contact</button>
</div>

<div class="chat-input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask Nelson anything..." rows="1" autocomplete="off"></textarea>
    <button class="send-btn mic-btn" id="micBtn" title="Voice input" aria-label="Voice input">
      <i class="fas fa-microphone"></i>
    </button>
    <button class="send-btn" id="sendBtn" title="Send" aria-label="Send">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>

<div class="status-bar">
  AI Twin v3 · Streaming · <a href="https://linkedin.com/in/nbaroi" target="_blank">LinkedIn</a> · <a href="mailto:nelson6114007@gmail.com">Email</a>
</div>

<script>
// ===== Configuration =====
const STORAGE_KEY = 'nelson-twin-chat-v3';
const MAX_HISTORY = 20;

// ===== State =====
let conversationHistory = [];
let isStreaming = false;
let voiceOutput = false;
let recognition = null;

// ===== DOM =====
const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const resetBtn = document.getElementById('resetBtn');
const exportBtn = document.getElementById('exportBtn');
const voiceToggleBtn = document.getElementById('voiceToggleBtn');
const suggestions = document.getElementById('suggestions');

// ===== Marked + DOMPurify config =====
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

function renderMarkdown(text) {
  const raw = marked.parse(text);
  return DOMPurify.sanitize(raw);
}

// ===== Storage =====
function loadHistory() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const data = JSON.parse(stored);
      if (Array.isArray(data) && data.length > 0) {
        conversationHistory = data.slice(-MAX_HISTORY);
        return true;
      }
    }
  } catch (e) {}
  return false;
}

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory.slice(-MAX_HISTORY)));
  } catch (e) {}
}

// ===== Rendering =====
function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  const senderName = role === 'user' ? 'You' : 'Nelson';
  msg.innerHTML = `<span class="sender">${senderName}</span><div class="content"></div>`;
  const contentEl = msg.querySelector('.content');

  if (role === 'bot') {
    contentEl.innerHTML = renderMarkdown(content);
  } else {
    contentEl.textContent = content;
  }

  chatMessages.appendChild(msg);
  scrollToBottom();
  return contentEl;
}

function addTypingIndicator() {
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.id = 'typing';
  msg.innerHTML = `<span class="sender">Nelson</span><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chatMessages.appendChild(msg);
  scrollToBottom();
  return msg;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  });
}

// ===== Streaming =====
async function streamChat(message) {
  if (!message.trim() || isStreaming) return;
  isStreaming = true;

  // Hide suggestions after first interaction
  if (conversationHistory.length === 0) suggestions.style.display = 'none';

  // Add user message
  addMessage('user', message);
  conversationHistory.push({ role: 'user', content: message });
  userInput.value = '';
  autoResize();
  sendBtn.disabled = true;

  // Create bot message container with cursor
  const typing = addTypingIndicator();
  let botContentEl = null;
  let fullText = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        history: conversationHistory.slice(-10),
        stream: true,
      }),
    });

    if (!response.ok || !response.body) throw new Error('No response');

    removeTyping();
    botContentEl = addMessage('bot', '');
    botContentEl.innerHTML = '<span class="cursor-blink"></span>';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if (parsed.delta) {
            fullText += parsed.delta;
            botContentEl.innerHTML = renderMarkdown(fullText) + '<span class="cursor-blink"></span>';
            scrollToBottom();
          }
        } catch (e) {}
      }
    }

    // Final render without cursor
    botContentEl.innerHTML = renderMarkdown(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });
    saveHistory();

    // Voice output if enabled
    if (voiceOutput && fullText) speak(fullText);
  } catch (err) {
    removeTyping();
    if (!botContentEl) {
      botContentEl = addMessage('bot', '');
    }
    botContentEl.innerHTML = renderMarkdown(
      "Connection hiccup. Server might be warming up — give it 5 seconds and try again."
    );
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
}

// ===== Voice (Web Speech API) =====
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.style.display = 'none';
    return;
  }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    userInput.value = transcript;
    autoResize();
  };

  recognition.onend = () => {
    micBtn.classList.remove('recording');
    if (userInput.value.trim()) streamChat(userInput.value);
  };

  recognition.onerror = () => {
    micBtn.classList.remove('recording');
  };

  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('recording')) {
      recognition.stop();
    } else {
      try {
        recognition.start();
        micBtn.classList.add('recording');
      } catch (e) {}
    }
  });
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  // Strip markdown for speech
  const plain = text
    .replace(/```[\s\S]*?```/g, ' code block ')
    .replace(/[*_`#>\-]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 500);
  const utter = new SpeechSynthesisUtterance(plain);
  utter.rate = 1.05;
  utter.pitch = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

// ===== UI Handlers =====
function autoResize() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
}

userInput.addEventListener('input', autoResize);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    streamChat(userInput.value);
  }
});

sendBtn.addEventListener('click', () => streamChat(userInput.value));

document.querySelectorAll('.suggestion-chip').forEach(chip => {
  chip.addEventListener('click', () => streamChat(chip.dataset.msg));
});

resetBtn.addEventListener('click', () => {
  if (confirm('Clear this conversation?')) {
    conversationHistory = [];
    saveHistory();
    chatMessages.innerHTML = '';
    showWelcome();
    suggestions.style.display = 'flex';
  }
});

exportBtn.addEventListener('click', () => {
  const txt = conversationHistory
    .map(m => `[${m.role.toUpperCase()}]\n${m.content}\n`)
    .join('\n---\n\n');
  const blob = new Blob([txt], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nelson-chat-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

voiceToggleBtn.addEventListener('click', () => {
  voiceOutput = !voiceOutput;
  const icon = voiceToggleBtn.querySelector('i');
  if (voiceOutput) {
    icon.className = 'fas fa-volume-up';
    voiceToggleBtn.style.color = 'var(--accent)';
    voiceToggleBtn.title = 'Voice output (on)';
  } else {
    icon.className = 'fas fa-volume-mute';
    voiceToggleBtn.style.color = '';
    voiceToggleBtn.title = 'Voice output (off)';
    speechSynthesis?.cancel();
  }
});

// ===== Welcome / Init =====
function showWelcome() {
  addMessage('bot',
    "Hey. I'm Nelson's AI twin — trained on his real biography, projects, and how he actually talks.\n\nAsk me anything: career, the Rooppur nuclear plant, Ireland plans, tech skills, or just life advice. Direct answers, no fluff."
  );
}

function restoreConversation() {
  if (loadHistory() && conversationHistory.length > 0) {
    suggestions.style.display = 'none';
    for (const msg of conversationHistory) {
      addMessage(msg.role === 'assistant' ? 'bot' : 'user', msg.content);
    }
  } else {
    showWelcome();
  }
}

// ===== Init =====
restoreConversation();
initSpeechRecognition();
userInput.focus();
</script>
</body>
</html>
